<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cozy Book Log</title>

    <link rel="stylesheet" href="css.css">
</head>
<body>

    <!-- Header -->
    <header>
        <h1>📚 Cozy Book Log</h1>
        <p>Track your reading journey</p>
    </header>

    <!-- Search and Controls -->
    <section class="top-panels">

    <!-- Add Book Panel -->
    <div class="panel add-book">
        <h2>Add a New Book</h2>

        <input type="text" id="titleInput" placeholder="Title">
        <input type="text" id="authorInput" placeholder="Author">
        <input type="text" id="genreInput" placeholder="Genre">
        <input type="text" id="seriesInput" placeholder="Series">

        <div class="form-row">

		<select id="statusInput">
			<option value="to-read">To Read</option>
			<option value="reading">Reading</option>
			<option value="completed">Completed</option>
		</select>

		<select id="ratingInput">
			<option value="0">No rating</option>
			<option value="1">★☆☆☆☆</option>
			<option value="2">★★☆☆☆</option>
			<option value="3">★★★☆☆</option>
			<option value="4">★★★★☆</option>
			<option value="5">★★★★★</option>
		</select>

	</div>

        <button id="addBookBtn">Add Book</button>
    </div>


    <!-- Search / Sort / Filter Panel -->
    <div class="panel controls-panel">

        <h2>Find Books</h2>

        <input type="text" id="searchInput" placeholder="Search by title, author, or series...">

        <select id="sortSelect">
            <option value="">Sort by</option>
            <option value="title">Title</option>
            <option value="status">Status</option>
            <option value="rating">Rating</option>
        </select>

        <select id="filterSelect">
            <option value="">Filter by status</option>
            <option value="to-read">To Read</option>
            <option value="reading">Reading</option>
            <option value="completed">Completed</option>
        </select>

    </div>

</section>

	<section class="bookshelf">
		<h2>📚 My Bookshelf</h2>
		<div id="bookshelfGrid"></div>
	</section>

    <!-- Book List -->
    <section class="library">
        <h2>Your Library</h2>
		<p id="libraryStatus"></p>

        <div id="bookList">
            <!-- Book cards will go here -->
        </div>
    </section>

	<div id="toast" class="toast"></div>

    <script src="js.js"></script>
</body>
</html>
